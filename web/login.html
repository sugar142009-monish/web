<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maison Login - BIJOY AND SONA Jewellery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;400;500&display=swap" rel="stylesheet">

    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --royal-gold: #c5a059;
            --deep-charcoal: #121212;
            --cream: #f9f7f2;
            --white: #ffffff;
            --muted-gray: #8e8e8e;
            --transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--cream);
            color: var(--deep-charcoal);
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- LOGIN CONTAINER SPIN --- */
        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 1100px;
            height: 650px;
            background: var(--white);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.05);
            margin: 20px;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1.2s forwards ease-out;
        }

        /* --- LEFT SIDE: THE IMAGE BRANDING --- */
        .login-visual {
            flex: 1;
            position: relative;
            background: #000;
            display: none; /* Hidden on mobile devices */
        }

        @media (min-width: 768px) {
            .login-visual { display: block; }
        }

        .login-visual img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.55;
        }

        .visual-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--white);
            padding: 40px;
            text-align: center;
            z-index: 2;
        }

        .visual-overlay h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: 2.5rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .visual-overlay p {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--cream);
            opacity: 0.8;
        }

        /* --- RIGHT SIDE: THE FORM --- */
        .login-container {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        @media (max-width: 480px) {
            .login-container { padding: 30px; }
        }

        .back-to-home {
            position: absolute;
            top: 40px;
            left: 60px;
            text-decoration: none;
            color: var(--muted-gray);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
        }

        .back-to-home:hover {
            color: var(--royal-gold);
        }

        .login-header {
            margin-bottom: 40px;
        }

        .brand-logo {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.4rem;
            letter-spacing: 4px;
            font-weight: 700;
            color: var(--deep-charcoal);
            margin-bottom: 10px;
        }

        .login-header p {
            font-size: 0.85rem;
            color: var(--muted-gray);
            letter-spacing: 1px;
        }

        /* --- FORM ELEMENTS --- */
        .form-group {
            position: relative;
            margin-bottom: 30px;
        }

        .form-input {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1px solid #e0e0e0;
            background: transparent;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            color: var(--deep-charcoal);
            outline: none;
            transition: var(--transition);
        }

        .form-label {
            position: absolute;
            top: 12px;
            left: 0;
            font-size: 0.8rem;
            color: var(--muted-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        /* Float the label when input is focused or not empty */
        .form-input:focus ~ .form-label,
        .form-input:not(:placeholder-shown) ~ .form-label {
            top: -12px;
            font-size: 0.65rem;
            color: var(--royal-gold);
            letter-spacing: 2px;
        }

        .form-input:focus {
            border-bottom: 1px solid var(--royal-gold);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            margin-bottom: 40px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--deep-charcoal);
            cursor: pointer;
        }

        .remember-me input {
            accent-color: var(--royal-gold);
        }

        .forgot-pass {
            color: var(--muted-gray);
            text-decoration: none;
            transition: 0.3s;
        }

        .forgot-pass:hover {
            color: var(--royal-gold);
        }

        /* --- REUSED BUTTON STYLE --- */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--royal-gold);
            color: var(--royal-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-submit:hover {
            background: var(--royal-gold);
            color: var(--white);
        }

        .register-prompt {
            text-align: center;
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--muted-gray);
        }

        .register-prompt a {
            color: var(--deep-charcoal);
            text-decoration: none;
            font-weight: bold;
            margin-left: 5px;
            transition: 0.3s;
        }

        .register-prompt a:hover {
            color: var(--royal-gold);
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <!-- Left Side Hero Display -->
        <div class="login-visual">
            <!-- Reusing Unsplash aesthetic imagery matching your template -->
            <img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?q=80&w=800" alt="Maison Vault">
            <div class="visual-overlay">
                <h2>The Vault</h2>
                <p>Exclusive High Jewellery Access</p>
            </div>
        </div>

        <!-- Right Side Functional Login Box -->
        <div class="login-container">
            <!-- Link pointing back to your main page. Alter filename if needed -->
            <a href="index.html" class="back-to-home">← Return to Maison</a>

            <div class="login-header">
                <div class="brand-logo">BIJOY AND SONA</div>
                <p>Please sign in to access your personal collection profile.</p>
            </div>

            <form action="#" method="POST" autocomplete="off">
                <div class="form-group">
                    <input type="email" id="email" class="form-input" placeholder=" " required>
                    <label Thru="email" class="form-label">Email Address</label>
                </div>

                <div class="form-group">
                    <input type="password" id="password" class="form-input" placeholder=" " required>
                    <label Thru="password" class="form-label">Password</label>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember Me
                    </label>
                    <a href="#" class="forgot-pass">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-submit">Enter Private Vault</button>
            </form>

            <div class="register-prompt">
                New client? <a href="#">Request an Account</a>
            </div>
        </div>
    </div>

</body>
</html>
