<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Diamonds & High Jewellery</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">

    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --royal-gold: #c5a059;
            --deep-charcoal: #121212;
            --cream: #f9f7f2;
            --white: #ffffff;
            --transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--cream);
            color: var(--deep-charcoal);
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        nav.scrolled {
            padding: 15px 5%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.8rem;
            letter-spacing: 8px;
            font-weight: 700;
            color: gray;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--deep-charcoal);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--royal-gold);
        }

        

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transform: scale(1.1);
            transition: 2s ease-out;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: var(--white);
        }

        .hero-content h1 {
            font-family: 'Bodoni Moda', serif;
            font-size: 5rem;
            font-weight: 400;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.5s forwards 0.5s;
        }

        .hero-content p {
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInUp 1.5s forwards 0.8s;
        }

        /* --- PRODUCT GRID --- */
        .container {
            max-width: 1200px;
            margin: 100px auto;
            padding: 0 5%;
        }

        .section-header {
            text-align: center;
            margin-bottom: 80px;
        }

        .section-header h2 {
            font-family: 'Bodoni Moda', serif;
            font-size: 3rem;
            font-weight: 400;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 50px;
        }

        .card {
            background: var(--white);
            padding: 20px;
            text-align: center;
            transition: var(--transition);
            opacity: 0;
            transform: translateY(40px);
        }

        .card.active {
            opacity: 1;
            transform: translateY(0);
        }

        .img-container {
            overflow: hidden;
            height: 450px;
            margin-bottom: 25px;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.5s ease;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card h3 {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .card .price {
            color: var(--royal-gold);
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* --- BUTTONS --- */
        .btn {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid var(--royal-gold);
            color: var(--royal-gold);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            transition: 0.4s;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--royal-gold);
            color: white;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 3rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="logo">BIJOY AND SONA Jewellery</div>
        <ul class="nav-links">
            <li><a href="collections.html">Collections</a></li>
            <li><a href="diamonds.html">Diamonds</a></li>
            <li><a href="bispoke.html">Bespoke</a></li>
        </ul>
        <a href="i.html" class="btn" style="padding: 10px 20px;">Inquire</a>
    </nav>

    <header class="hero">
        <img src="c:\Users\hp\OneDrive\Pictures\Screenshots\Screenshot 2026-04-10 214856.png" class="hero-bg" alt="Jewellery Backdrop">
        <div class="hero-content">
            <p>High Jewellery Maison</p>
            <h1>Pure Elegance</h1>
            <a href="collections.html" class="btn" style="color: white; border-color: white;">View Heritage</a>
        </div>
    </header>

    <section class="container" id="collections">
        <div class="section-header">
            <h2>The Masterpieces</h2>
        </div>

        <div class="grid">
            <div class="card reveal">
                <div class="img-container">
                    <img src="c:\Users\hp\OneDrive\Pictures\Screenshots\Screenshot 2026-04-10 214856.png" alt="Diamond Ring">
                </div>
                <h3>The Solstice Diamond</h3>
                <p class="price">Price Upon Request</p>
            </div>

            <div class="card reveal">
                <div class="img-container">
                    <img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?q=80&w=800" alt="Gold Bracelet">
                </div>
                <h3>Eternal Gold Cuff</h3>
                <p class="price">$14,200</p>
            </div>

            <div class="card reveal">
                <div class="img-container">
                    <img src="c:\Users\hp\Downloads\Gemini_Generated_Image_vibrk9vibrk9vibr.png" alt="Jewellery">
                </div>
                <h3>Imperial Collection</h3>
                <p class="price">Limited Edition</p>
            </div>
        </div>
    </section>

    <script>
        // 1. Navbar Scroll Effect
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 100) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // 2. Scroll Reveal Animation
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach((el) => {
            observer.observe(el);
        });
    </script>

</body>
</html>
